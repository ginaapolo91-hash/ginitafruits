<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventario Bodega</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#f1f5f9;min-height:100vh;color:#0f172a;}
table{border-collapse:collapse;}
::selection{background:#c7d2fe;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
input:focus,select:focus{outline:none;border-color:#6366f1!important;box-shadow:0 0 0 3px rgba(99,102,241,.15)!important;}
button:hover:not(:disabled){filter:brightness(1.05);}
button:active:not(:disabled){transform:scale(.98);}
button:disabled{opacity:.5;cursor:not-allowed;}

/* HEADER */
header{background:#0f172a;padding:20px 24px;border-bottom:3px solid #6366f1;position:sticky;top:0;z-index:50;}
.header-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:42px;height:42px;background:#6366f1;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;}
.logo h1{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.5px;}
.logo p{font-size:13px;color:#94a3b8;}
.btn-header{display:flex;align-items:center;gap:6px;padding:10px 18px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* SUMMARY */
.summary-grid{max-width:1100px;margin:20px auto 0;padding:0 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;}
.summary-card{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.summary-label{color:#94a3b8;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.summary-value{font-size:26px;font-weight:800;margin-top:6px;}

/* TABS */
.tab-nav{max-width:1100px;margin:20px auto 0;padding:0 24px;display:flex;gap:6px;overflow-x:auto;}
.tab-btn{display:flex;align-items:center;gap:6px;padding:10px 18px;background:#fff;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;font-weight:600;color:#64748b;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s;}
.tab-btn.active{background:#6366f1;border-color:#6366f1;color:#fff;}
.tab-btn.active.green{background:#16a34a;border-color:#16a34a;}
.tab-btn.active.red{background:#dc2626;border-color:#dc2626;}

/* CONTENT */
.content{max-width:1100px;margin:0 auto;padding:20px 24px 40px;}

/* TWO-COL LAYOUT */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
@media(max-width:860px){.two-col{grid-template-columns:1fr;}}

/* FORM CARD */
.form-card{background:#fff;border-radius:14px;border:2px solid #16a34a;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.05);}
.form-card.exit-card{border-color:#dc2626;}
.form-card.neutral{border-color:#e2e8f0;}
.form-title{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800;color:#16a34a;margin-bottom:4px;}
.form-title.exit-title{color:#dc2626;}
.form-title.neutral-title{color:#0f172a;}
.form-sub{font-size:13px;color:#94a3b8;margin-bottom:16px;}

/* LABELS & INPUTS */
label{display:block;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
input[type=text],input[type=number],input[type=date],select{width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;color:#0f172a;background:#f8fafc;transition:all .15s;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
.full-col{grid-column:1/-1;}
.req{color:#dc2626;font-weight:700;}

/* TOTAL INPUT ROW */
.total-input-row{display:flex;align-items:flex-end;gap:8px;}
.total-input-row input{flex:1;}
.btn-calc{display:inline-flex;align-items:center;gap:5px;padding:10px 12px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0;}

/* TOTAL DISPLAY (per-item) */
.item-total-display{background:#f0fdf4;border:2px solid #86efac;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.item-total-display.exit-td{background:#fff5f5;border-color:#fca5a5;}
.item-total-label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.8px;}
.item-total-val{font-size:18px;font-weight:800;color:#16a34a;}
.item-total-val.exit-v{color:#dc2626;}
.item-total-val.zero{color:#94a3b8;}

/* ADD TO LIST BUTTON */
.btn-add-list{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:14px;}
.btn-add-list.exit-add{background:#dc2626;}

/* SEARCH + PICKER */
.search-box{display:flex;align-items:center;gap:8px;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;background:#f8fafc;color:#94a3b8;}
.search-input{flex:1;border:none;outline:none;font-size:14px;font-family:'DM Sans',sans-serif;color:#0f172a;background:transparent;}
.picker-wrap{position:relative;margin-bottom:12px;}
.dropdown{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:#fff;border:2px solid #e2e8f0;border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.12);z-index:200;max-height:240px;overflow-y:auto;display:none;}
.dropdown.open{display:block;}
.dd-item{padding:11px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid #f1f5f9;font-size:13px;}
.dd-item:hover{background:#f8fafc;}
.dd-item:last-child{border-bottom:none;}
.dd-empty{padding:16px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;}
.prod-code{font-family:'JetBrains Mono',monospace;font-size:11px;background:#e2e8f0;padding:2px 7px;border-radius:4px;font-weight:600;}
.prod-name{font-weight:600;flex:1;}
.prod-cost{color:#16a34a;font-weight:700;font-size:12px;}
.selected-prod{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:#f0fdf4;border:2px solid #86efac;border-radius:8px;margin-bottom:10px;}
.selected-prod.exit-sel{background:#fff5f5;border-color:#fca5a5;}
.remove-btn{background:transparent;border:none;cursor:pointer;color:#94a3b8;padding:4px;font-size:15px;line-height:1;}
.add-new-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ── CART / LIST ── */
.cart-card{background:#fff;border-radius:14px;border:2px solid #e2e8f0;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.05);display:flex;flex-direction:column;gap:0;}
.cart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.cart-title{font-size:16px;font-weight:800;color:#0f172a;display:flex;align-items:center;gap:8px;}
.cart-badge{background:#6366f1;color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;}
.cart-badge.green-b{background:#16a34a;}
.cart-badge.red-b{background:#dc2626;}
.btn-clear-cart{background:transparent;border:1px solid #e2e8f0;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;color:#94a3b8;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-clear-cart:hover{color:#dc2626;border-color:#fca5a5;}

/* Cart table */
.cart-table{width:100%;font-size:13px;border-collapse:collapse;}
.cart-table th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;border-bottom:2px solid #e2e8f0;white-space:nowrap;}
.cart-table td{padding:10px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
.cart-table tr:last-child td{border-bottom:none;}
.cart-table tr:hover td{background:#f8fafc;}

/* Cart footer */
.cart-footer{margin-top:16px;padding-top:16px;border-top:2px solid #e2e8f0;}
.cart-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;background:#f8fafc;border-radius:10px;padding:14px 18px;margin-bottom:14px;}
.cart-total-label{font-size:13px;font-weight:700;color:#64748b;}
.cart-total-amount{font-size:24px;font-weight:800;color:#0f172a;}
.btn-submit-cart{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-submit-cart.exit-submit{background:#dc2626;}
.btn-submit-cart:disabled{opacity:.4;cursor:not-allowed;}
.cart-empty{text-align:center;padding:32px 16px;color:#94a3b8;font-size:14px;}

/* HISTORY CARD */
.history-card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.05);}
.filter-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:8px 16px;border:2px solid #e2e8f0;border-radius:8px;background:#fff;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.filter-btn.active{background:#16a34a;border-color:#16a34a;color:#fff;}
.filter-btn.active.red-f{background:#dc2626;border-color:#dc2626;color:#fff;}
.table-scroll{overflow-x:auto;}
table{width:100%;font-size:13px;}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;border-bottom:2px solid #e2e8f0;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
tr:hover td{background:#f8fafc;}
.badge{padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700;display:inline-block;}
.badge-in{background:#dcfce7;color:#16a34a;}
.badge-out{background:#fee2e2;color:#dc2626;}
.badge-stock-pos{background:#dcfce7;color:#16a34a;}
.badge-stock-neg{background:#fee2e2;color:#dc2626;}
.badge-stock-zero{background:#f1f5f9;color:#64748b;}
.del-btn{background:transparent;border:none;cursor:pointer;color:#cbd5e1;padding:4px;transition:color .15s;border-radius:4px;}
.del-btn:hover{color:#dc2626;}
.empty-state{text-align:center;padding:40px 20px;color:#94a3b8;display:flex;flex-direction:column;align-items:center;gap:8px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:9000;animation:fadeIn .2s ease;padding:24px;}
.modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.2);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-header h3{font-size:18px;font-weight:800;}
.close-btn{background:transparent;border:none;cursor:pointer;color:#94a3b8;padding:4px;font-size:18px;}
.modal-fields{display:flex;flex-direction:column;gap:14px;}
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;margin-top:16px;}
.btn-primary.indigo{background:#6366f1;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;animation:slideUp .3s ease;}
.toast.success{background:#16a34a;color:#fff;}
.toast.error{background:#dc2626;color:#fff;}
.toast.warning{background:#d97706;color:#fff;}
.toast.info{background:#0891b2;color:#fff;}

.mono{font-family:'JetBrains Mono',monospace;font-size:12px;}
.hidden{display:none!important;}
@media(max-width:600px){.grid-2{grid-template-columns:1fr;}.summary-grid{grid-template-columns:1fr 1fr;}.cart-meta{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="m16.5 9.4-9-5.19"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.27 6.96 12 12.01l8.73-5.05M12 22.08V12"/></svg>
      </div>
      <div>
        <h1>Inventario Bodega</h1>
        <p>Control de ingresos y salidas</p>
      </div>
    </div>
    <button class="btn-header" onclick="openModal()">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Nuevo Producto
    </button>
  </div>
</header>

<div class="summary-grid" id="summary-grid"></div>

<div class="tab-nav">
  <button class="tab-btn active green" id="tab-entry" onclick="switchTab('entry')">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0-4-4m4 4 4-4"/><rect x="3" y="15" width="18" height="6" rx="2"/></svg>
    Ingreso
  </button>
  <button class="tab-btn" id="tab-exit" onclick="switchTab('exit')">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 15V3m0 0-4 4m4-4 4 4"/><rect x="3" y="15" width="18" height="6" rx="2"/></svg>
    Salida
  </button>
  <button class="tab-btn" id="tab-products" onclick="switchTab('products')">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="m16.5 9.4-9-5.19"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.27 6.96 12 12.01l8.73-5.05M12 22.08V12"/></svg>
    Productos
  </button>
  <button class="tab-btn" id="tab-history" onclick="switchTab('history')">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    Historial
  </button>
</div>

<div class="content">
  <div id="panel-entry"></div>
  <div id="panel-exit" class="hidden"></div>
  <div id="panel-products" class="hidden"></div>
  <div id="panel-history" class="hidden"></div>
</div>

<!-- ADD PRODUCT MODAL -->
<div id="modal-overlay" class="overlay hidden" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3>Añadir Nuevo Producto</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-fields">
      <div><label>Código</label><input type="text" id="m-code" placeholder="Ej: 7861000123"/></div>
      <div><label>Nombre</label><input type="text" id="m-name" placeholder="Ej: Arroz 1kg"/></div>
      <div><label>Costo ($)</label><input type="number" id="m-cost" step="0.01" placeholder="0.00"/></div>
    </div>
    <button class="btn-primary indigo" style="width:100%" onclick="saveModalProduct()">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
      Guardar Producto
    </button>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
// ── Config ─────────────────────────────────────────────────────
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbxGoGV9iB2Ns9ydwACjSXJ7Ovd_YfEHwfZEopcywE41Ph8lJtB_SOg8OeZj5cKIM9MgLg/exec";
const STORAGE_KEY = "fruver-inventario-v3";
const EMAIL = "bryanligabow@gmail.com";

// ── Utils ──────────────────────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = d => { if(!d) return '—'; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; };
const fmt$ = n => '$'+Number(n).toFixed(2);
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── State ──────────────────────────────────────────────────────
let state = { products:[], entries:[], exits:[] };
let currentTab = 'entry';

// Cart state (in-progress lists, not yet submitted)
let entryCart = [];   // [{rowId, productId, productCode, productName, qty, price}]
let exitCart  = [];

// Picker selection
let pickerSelected = { entry: null, exit: null };

function save() { try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }
function load() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if(d){ state = JSON.parse(d); return; }
  } catch(e){}
  state.products = FRUVER_PRODUCTS.map(p=>({...p}));
  save();
}

// ── Google Sheets ──────────────────────────────────────────────
async function sendToSheets(payload) {
  try {
    await fetch(SHEETS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    return true;
  } catch(e){ return false; }
}

// ── Picker ─────────────────────────────────────────────────────
function renderPicker(type) {
  const sel = pickerSelected[type];
  const isExit = type === 'exit';
  if(sel) {
    return `<div class="selected-prod ${isExit?'exit-sel':''}">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span class="prod-code">${esc(sel.code)}</span>
        <strong>${esc(sel.name)}</strong>
        <span style="color:#16a34a;font-weight:700;font-size:13px">${fmt$(sel.cost)}</span>
      </div>
      <button class="remove-btn" onclick="clearPicker('${type}')">✕</button>
    </div>`;
  }
  return `<div class="picker-wrap" id="picker-wrap-${type}">
    <label>Buscar Producto</label>
    <div class="search-box">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="picker-input-${type}" placeholder="Código o nombre del producto..."
        oninput="filterPicker('${type}')" onfocus="showDD('${type}')" onblur="setTimeout(()=>hideDD('${type}'),200)"/>
    </div>
    <div class="dropdown" id="picker-dd-${type}"></div>
  </div>`;
}
function filterPicker(type) {
  const q = (document.getElementById('picker-input-'+type)?.value||'').trim().toLowerCase();
  const dd = document.getElementById('picker-dd-'+type);
  if(!dd) return;
  if(!q){ dd.classList.remove('open'); return; }
  const matches = state.products.filter(p=>p.code.toLowerCase().includes(q)||p.name.toLowerCase().includes(q)).slice(0,15);
  dd.innerHTML = matches.length
    ? matches.map(p=>`<div class="dd-item" onmousedown="selectPicker('${type}','${p.id}')">
        <span class="prod-code">${esc(p.code)}</span>
        <span class="prod-name">${esc(p.name)}</span>
        <span class="prod-cost">${fmt$(p.cost)}</span>
      </div>`).join('')
    : `<div class="dd-empty"><span style="color:#94a3b8">No encontrado</span>
        <button class="add-new-btn" onmousedown="openModal()">+ Añadir producto</button></div>`;
  dd.classList.add('open');
}
function showDD(type){ filterPicker(type); }
function hideDD(type){ document.getElementById('picker-dd-'+type)?.classList.remove('open'); }
function selectPicker(type, pid) {
  pickerSelected[type] = state.products.find(x=>x.id===pid)||null;
  renderPanel(currentTab);
}
function clearPicker(type) {
  pickerSelected[type] = null;
  renderPanel(currentTab);
}

// ── Item-level total helpers ───────────────────────────────────
function updateItemTotal(prefix) {
  const qty   = parseFloat(document.getElementById(prefix+'-qty')?.value||'0');
  const price = parseFloat(document.getElementById(prefix+'-price')?.value||'0');
  const total = qty>0 && price>0 ? qty*price : 0;
  const el = document.getElementById(prefix+'-itotal');
  if(!el) return;
  const isExit = prefix==='x';
  el.textContent = fmt$(total);
  el.className = 'item-total-val'+(isExit?' exit-v':'')+(total===0?' zero':'');
}
function calcUnitFromTotal(prefix) {
  const qty        = parseFloat(document.getElementById(prefix+'-qty')?.value||'0');
  const totalPaid  = parseFloat(document.getElementById(prefix+'-totalinput')?.value||'0');
  if(qty>0 && totalPaid>0){
    document.getElementById(prefix+'-price').value = (totalPaid/qty).toFixed(4);
    updateItemTotal(prefix);
    toast('Precio unitario calculado ✓','info');
  } else { toast('Ingresa la cantidad y el total pagado primero','error'); }
}

function addToEntryCart() {
  const sel   = pickerSelected['entry'];
  const qty   = parseInt(document.getElementById('e-qty')?.value||'0');
  const price = parseFloat(document.getElementById('e-price')?.value||'0');
  if(!sel)   { toast('Selecciona un producto primero','error'); return; }
  if(qty<1)  { toast('Ingresa una cantidad válida','error'); return; }
  if(!price) { toast('Ingresa el precio unitario','error'); return; }
  entryCart.push({ rowId:uid(), productId:sel.id, productCode:sel.code, productName:sel.name, qty, price });
  pickerSelected['entry'] = null;
  toast(`"${sel.name}" agregado a la lista ✓`, 'success');
  renderEntry();
}

function removeFromEntryCart(rowId) {
  entryCart = entryCart.filter(r=>r.rowId!==rowId);
  renderEntry();
}

function clearEntryCart() {
  if(entryCart.length===0) return;
  if(!confirm('¿Limpiar toda la lista de ingreso?')) return;
  entryCart = [];
  renderEntry();
}

async function submitEntryCart() {
  if(entryCart.length===0) { toast('La lista está vacía','error'); return; }
  const supplier    = (document.getElementById('e-supplier')?.value||'').trim();
  const responsible = (document.getElementById('e-responsible')?.value||'').trim();
  const date        = document.getElementById('e-date')?.value||today();
  const notes       = document.getElementById('e-notes')?.value||'';
  if(!supplier)    { toast('Ingresa el nombre del proveedor','error'); return; }
  if(!responsible) { toast('Ingresa el nombre del responsable','error'); return; }

  const btn = document.getElementById('e-submit-btn');
  btn.disabled = true;
  btn.innerHTML = `<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg> Enviando…`;

  // Save all items to state
  const newEntries = entryCart.map(r => ({
    id: uid(), productId: r.productId, quantity: r.qty, price: r.price,
    date, supplier, responsible, notes
  }));
  state.entries.push(...newEntries);
  save();
  renderSummary();

  // Send full list to Sheets in one payload
  const ok = await sendToSheets({
    type: 'ingreso',
    fecha: date, proveedor: supplier, responsable: responsible, notas: notes,
    email: EMAIL,
    items: entryCart.map(r=>({ codigo:r.productCode, producto:r.productName, cantidad:r.qty, precio:r.price, total:r.qty*r.price })),
    total_general: entryCart.reduce((s,r)=>s+r.qty*r.price,0)
  });

  toast(ok
    ? `✓ ${entryCart.length} producto(s) registrados y enviados a Sheets`
    : `${entryCart.length} producto(s) guardados (sin conexión a Sheets)`,
    ok ? 'success' : 'warning');

  entryCart = [];
  pickerSelected['entry'] = null;
  renderEntry();
}

// ── PRODUCTS PANEL ─────────────────────────────────────────────
let prodSearch = '';
function renderProducts() {
  const filtered = state.products.filter(p=>{
    if(!prodSearch) return true;
    const q=prodSearch.toLowerCase();
    return p.code.toLowerCase().includes(q)||p.name.toLowerCase().includes(q);
  });
  const getStock = pid => {
    const inQ  = state.entries.filter(e=>e.productId===pid).reduce((s,e)=>s+e.quantity,0);
    const outQ = state.exits.filter(e=>e.productId===pid).reduce((s,e)=>s+e.quantity,0);
    return inQ-outQ;
  };
  document.getElementById('panel-products').innerHTML = `
    <div class="history-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div class="form-title neutral-title" style="margin-bottom:0">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="m16.5 9.4-9-5.19"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.27 6.96 12 12.01l8.73-5.05M12 22.08V12"/></svg>
          Catálogo de Productos (${state.products.length})
        </div>
      </div>
      <div class="search-box" style="margin-bottom:16px">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" value="${esc(prodSearch)}" placeholder="Buscar en catálogo..." oninput="prodSearch=this.value;renderProducts()"/>
      </div>
      ${filtered.length===0
        ? `<div class="empty-state"><p>No hay productos</p></div>`
        : `<div class="table-scroll"><table>
          <thead><tr><th>Código</th><th>Nombre</th><th>Costo</th><th>Stock</th><th></th></tr></thead>
          <tbody>${filtered.map(p=>{
            const stock=getStock(p.id);
            const cls=stock>0?'badge-stock-pos':stock<0?'badge-stock-neg':'badge-stock-zero';
            return `<tr>
              <td class="mono">${esc(p.code)}</td>
              <td style="font-weight:600">${esc(p.name)}</td>
              <td>${fmt$(p.cost)}</td>
              <td><span class="badge ${cls}">${stock}</span></td>
              <td><button class="del-btn" onclick="deleteProduct('${p.id}')">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/></svg>
              </button></td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>`}
    </div>`;
}
function deleteProduct(id) {
  if(!confirm('¿Eliminar este producto?')) return;
  state.products = state.products.filter(p=>p.id!==id);
  save(); renderSummary(); renderProducts();
  toast('Producto eliminado','warning');
}

// ── HISTORY PANEL ──────────────────────────────────────────────
let histFilter='all', histSearch='';
function renderHistory() {
  const getName = pid => state.products.find(p=>p.id===pid)?.name||'—';
  const getCode = pid => state.products.find(p=>p.id===pid)?.code||'—';
  let records = [
    ...state.entries.map(e=>({...e,type:'entry'})),
    ...state.exits.map(e=>({...e,type:'exit'}))
  ].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  if(histFilter!=='all') records=records.filter(r=>r.type===histFilter);
  if(histSearch){
    const q=histSearch.toLowerCase();
    records=records.filter(r=>getName(r.productId).toLowerCase().includes(q)||getCode(r.productId).toLowerCase().includes(q)||(r.supplier||'').toLowerCase().includes(q)||(r.responsible||'').toLowerCase().includes(q));
  }
  document.getElementById('panel-history').innerHTML = `
    <div class="history-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div class="form-title neutral-title" style="margin-bottom:0">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          Historial de Movimientos
        </div>
      </div>
      <div class="filter-row">
        <button class="filter-btn${histFilter==='all'?' active':''}" onclick="histFilter='all';renderHistory()">Todos</button>
        <button class="filter-btn${histFilter==='entry'?' active':''}" onclick="histFilter='entry';renderHistory()">Ingresos</button>
        <button class="filter-btn${histFilter==='exit'?' active red-f':''}" onclick="histFilter='exit';renderHistory()">Salidas</button>
        <div class="search-box" style="flex:1;min-width:180px">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="search-input" value="${esc(histSearch)}" placeholder="Filtrar por producto, proveedor, responsable..." oninput="histSearch=this.value;renderHistory()"/>
        </div>
      </div>
      ${records.length===0
        ? `<div class="empty-state"><p>No hay movimientos registrados</p></div>`
        : `<div class="table-scroll"><table>
          <thead><tr>
            <th>Fecha</th><th>Tipo</th><th>Código</th><th>Producto</th>
            <th>Cant.</th><th>Precio</th><th>Total</th>
            <th>Proveedor</th><th>Responsable</th><th>Detalle</th><th></th>
          </tr></thead>
          <tbody>${records.map(r=>`<tr>
            <td>${fmtDate(r.date)}</td>
            <td><span class="badge ${r.type==='entry'?'badge-in':'badge-out'}">${r.type==='entry'?'Ingreso':'Salida'}</span></td>
            <td class="mono">${esc(getCode(r.productId))}</td>
            <td style="font-weight:600">${esc(getName(r.productId))}</td>
            <td style="font-weight:700">${r.quantity}</td>
            <td>${r.price?fmt$(r.price):'—'}</td>
            <td style="font-weight:700">${r.price&&r.quantity?fmt$(r.price*r.quantity):'—'}</td>
            <td style="font-size:13px">${esc(r.supplier||'—')}</td>
            <td style="font-size:13px">${esc(r.responsible||'—')}</td>
            <td style="color:#94a3b8;font-size:13px">${esc(r.notes||r.reason||'—')}</td>

}
function deleteRecord(id, type) {
  if(type==='entry') state.entries=state.entries.filter(e=>e.id!==id);
  else state.exits=state.exits.filter(e=>e.id!==id);
  save(); renderSummary(); renderHistory();
  toast('Registro eliminado','warning');
}

// ── SUMMARY ────────────────────────────────────────────────────
function renderSummary() {
  const totalIn  = state.entries.reduce((s,e)=>s+e.quantity,0);
  const totalOut = state.exits.reduce((s,e)=>s+e.quantity,0);
  const costIn   = state.entries.reduce((s,e)=>s+(e.price||0)*e.quantity,0);
  const costOut  = state.exits.reduce((s,e)=>s+(e.price||0)*e.quantity,0);
  const cards = [
    {label:'Productos',value:state.products.length,color:'#6366f1'},
    {label:'Ingresos',value:totalIn,color:'#16a34a'},
    {label:'Comprado ($)',value:fmt$(costIn),color:'#0891b2'},
    {label:'Salidas',value:totalOut,color:'#dc2626'},
    {label:'Pérdida ($)',value:fmt$(costOut),color:'#d97706'},
  ];
  document.getElementById('summary-grid').innerHTML = cards.map(c=>`
    <div class="summary-card" style="border-top:3px solid ${c.color}">
      <div class="summary-label">${c.label}</div>
      <div class="summary-value" style="color:${c.color}">${c.value}</div>
    </div>`).join('');
}

// ── TABS ───────────────────────────────────────────────────────
function switchTab(t) {
  ['entry','exit','products','history'].forEach(k=>{
    document.getElementById('panel-'+k).classList.toggle('hidden',k!==t);
    const btn=document.getElementById('tab-'+k);
    btn.classList.remove('active','green','red');
    if(k===t){ btn.classList.add('active'); if(k==='entry') btn.classList.add('green'); if(k==='exit') btn.classList.add('red'); }
  });
  currentTab=t;
  renderPanel(t);
}
function renderPanel(t) {
  if(t==='entry') renderEntry();
  else if(t==='exit') renderExit();
  else if(t==='products') renderProducts();
  else renderHistory();
}

// ── MODAL ──────────────────────────────────────────────────────
function openModal(){ document.getElementById('modal-overlay').classList.remove('hidden'); }
function closeModal(){ document.getElementById('modal-overlay').classList.add('hidden'); }
function saveModalProduct(){
  const code=(document.getElementById('m-code').value||'').trim();
  const name=(document.getElementById('m-name').value||'').trim();
  const cost=parseFloat(document.getElementById('m-cost').value||'0');
  if(!code||!name){ toast('Código y nombre requeridos','error'); return; }
  state.products.push({id:uid(),code,name,cost:isNaN(cost)?0:cost});
  save(); renderSummary();
  toast(`Producto "${name}" añadido`,'success');
  closeModal();
  document.getElementById('m-code').value='';
  document.getElementById('m-name').value='';
  document.getElementById('m-cost').value='';
  if(currentTab==='products') renderProducts();
}

// ── TOAST ──────────────────────────────────────────────────────
let toastTimer;
function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast ${type}`; el.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.add('hidden'),3500);
}
